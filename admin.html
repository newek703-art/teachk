<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>학습 설계 관리자 대시보드</title>
<style>
    body { font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; margin: 0; padding: 0; background-color: #faf9f6; color: #2d3748; }

    .sidebar {
        position: fixed; top: 0; left: 0; bottom: 0; width: 230px;
        background-color: #1a365d; color: #ffffff; padding: 20px 16px;
        box-sizing: border-box; overflow-y: auto; border-right: 4px solid #d69e2e;
        display: flex; flex-direction: column; gap: 14px;
    }
    .sidebar h1 { font-size: 13pt; margin: 0 0 4px 0; line-height: 1.4; }
    .sidebar p { font-size: 8.5pt; color: #e2e8f0; opacity: 0.85; margin: 0 0 10px 0; line-height: 1.4; }
    .sidebar label { font-size: 8.5pt; font-weight: bold; color: #cbd5e0; display: block; margin-bottom: 4px; }
    .sidebar input[type="text"], .sidebar select {
        width: 100%; box-sizing: border-box; padding: 8px 10px; border-radius: 6px; border: none; font-size: 10pt;
    }
    .sidebar button, .sidebar a.open-btn {
        width: 100%; box-sizing: border-box; padding: 9px 10px; border-radius: 6px; border: none;
        font-size: 10pt; cursor: pointer; text-align: center; text-decoration: none; display: block;
    }
    .sidebar .refresh-btn { background-color: #2b6cb0; color: #fff; }
    .sidebar .app-open-btn { background-color: #2f855a; color: #fff; }
    .sidebar .logout-btn { background-color: #4a5568; color: #fff; margin-top: auto; }
    .sidebar-divider { border-top: 1px solid rgba(255,255,255,0.15); margin: 4px 0; }

    .main-content { margin-left: 230px; padding: 24px 28px; }

    .card { background: #ffffff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }

    #login-screen { display: none; max-width: 400px; margin: 100px auto; }
    #login-screen input { width: 100%; box-sizing: border-box; padding: 10px 12px; font-size: 11pt; border: 1px solid #cbd5e0; border-radius: 6px; margin-bottom: 10px; }
    #login-screen button { width: 100%; padding: 10px; font-size: 11pt; font-weight: bold; background-color: #2b6cb0; color: #fff; border: none; border-radius: 6px; cursor: pointer; }
    #login-screen button:hover { background-color: #2c5282; }
    #login-error { color: #c53030; font-size: 9.5pt; margin-top: 6px; display: none; }
    #login-btn { display: flex; align-items: center; justify-content: center; gap: 8px; }
    #login-btn:disabled { opacity: 0.7; cursor: not-allowed; }
    .spinner { width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.4); border-top-color: #ffffff; border-radius: 50%; animation: spin 0.7s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    #dashboard-screen { display: none; }

    table { width: 100%; min-width: 680px; border-collapse: collapse; font-size: 10.5pt; }
    th, td { white-space: nowrap; }
    th { background-color: #f7fafc; color: #4a5568; font-weight: bold; text-align: left; padding: 10px 12px; border-bottom: 2px solid #e2e8f0; cursor: pointer; user-select: none; }
    th:hover { color: #2b6cb0; }
    td { padding: 10px 12px; border-bottom: 1px solid #edf2f7; }
    tr:hover td { background-color: #f7fafc; }

    .course-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 9pt; font-weight: bold; }
    .course-badge.korean_teacher { background-color: #ebf8ff; color: #2b6cb0; }
    .course-badge.social_worker { background-color: #f0fff4; color: #22543d; }
    .course-badge.unknown { background-color: #edf2f7; color: #718096; }

    .open-btn { padding: 5px 12px; border: none; border-radius: 5px; background-color: #2b6cb0; color: #fff; font-size: 9.5pt; cursor: pointer; text-decoration: none; display: inline-block; }
    .open-btn:hover { background-color: #2c5282; }

    #empty-state, #loading-state { text-align: center; padding: 40px; color: #718096; }
    #student-count { font-size: 10pt; color: #718096; margin-bottom: 10px; }

    .name-link { color: #2b6cb0; font-weight: bold; cursor: pointer; text-decoration: underline; text-decoration-color: transparent; }
    .name-link:hover { text-decoration-color: #2b6cb0; }

    #student-modal {
        display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(26, 54, 93, 0.5); z-index: 1000; align-items: center; justify-content: center; padding: 20px;
    }
    #student-modal-card {
        background: #ffffff; border-radius: 10px; max-width: 780px; width: 100%; max-height: 85vh;
        overflow-y: auto; padding: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); position: relative;
    }
    #student-modal-close {
        position: absolute; top: 10px; right: 10px; cursor: pointer; font-size: 16pt; line-height: 1;
        color: #ffffff; border: none; background: #1a365d; border-radius: 50%;
        width: 34px; height: 34px; display: flex; align-items: center; justify-content: center;
        box-shadow: 0 2px 6px rgba(0,0,0,0.3); z-index: 10;
    }
    #student-modal-close:hover { background: #c53030; }

    @media (max-width: 700px) {
        .sidebar { position: static; width: auto; border-right: none; border-bottom: 4px solid #d69e2e; }
        .main-content { margin-left: 0; }
    }
</style>
</head>
<body>

    <div id="login-screen" class="card">
        <div style="font-weight: bold; margin-bottom: 12px; color: #1a365d;">🔒 관리자 비밀번호를 입력하세요</div>
        <form id="login-form" onsubmit="event.preventDefault(); login();">
            <input type="password" id="password-input" placeholder="비밀번호">
            <button type="submit" id="login-btn">입장</button>
        </form>
        <div id="login-error">비밀번호가 올바르지 않습니다.</div>
    </div>

    <div id="dashboard-screen">
        <div class="sidebar">
            <div>
                <h1>🛠️ 학습 설계<br>관리자 대시보드</h1>
                <p>등록된 전체 학생을 조회하고, 클릭해서 상세 화면으로 열람/수정할 수 있습니다.</p>
            </div>

            <div>
                <label for="search-input">🔍 이름 검색</label>
                <input type="text" id="search-input" placeholder="이름으로 검색" oninput="renderTable()">
            </div>

            <div>
                <label for="phone-search-input">📱 전화번호 뒷자리 검색</label>
                <input type="text" id="phone-search-input" placeholder="뒷자리 입력 (예: 1234)" maxlength="4" oninput="renderTable()">
            </div>

            <div>
                <label for="course-filter">과정 필터</label>
                <select id="course-filter" onchange="renderTable()">
                    <option value="">전체 과정</option>
                    <option value="korean_teacher">한국어교원 2급</option>
                    <option value="social_worker">사회복지사 2급</option>
                </select>
            </div>

            <button class="refresh-btn" onclick="loadStudents()">🔄 새로고침</button>
            <a id="open-app-btn" class="open-btn app-open-btn" href="#" target="_blank">📖 학습 설계 통합 앱 열기</a>

            <div class="sidebar-divider"></div>

            <button class="logout-btn" onclick="logout()">🔒 로그아웃</button>
        </div>

        <div class="main-content">
            <div id="student-count"></div>
            <div id="loading-state">불러오는 중...</div>
            <div id="empty-state" style="display:none;">등록된 학생이 없습니다.</div>

            <div class="card" id="table-wrap" style="display:none; padding: 0; overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th onclick="sortBy('name')">이름</th>
                            <th onclick="sortBy('phone')">전화번호</th>
                            <th onclick="sortBy('course')">과정</th>
                            <th onclick="sortBy('subjectCount')">과목수</th>
                            <th onclick="sortBy('totalCredit')">총학점</th>
                            <th onclick="sortBy('lastSaved')">최근 저장일시</th>
                            <th>바로가기</th>
                        </tr>
                    </thead>
                    <tbody id="student-table-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="student-modal" onclick="if(event.target===this) closeStudentCard()">
        <div id="student-modal-card">
            <button id="student-modal-close" onclick="closeStudentCard()">✕</button>
            <div id="student-modal-body"></div>
        </div>
    </div>

<script>
    // ⚠️ 실제 배포된 Apps Script 웹앱 주소로 바꿔서 사용하세요 (unified.html의 API_URL과 동일한 값)
    const API_URL = "https://script.google.com/macros/s/AKfycbyoQOAGu_gsrw9Csfxf8_HjG_f8pSHfJaPZFyz2HeC2wMPdIUpYFMgvt6GrIPDxbdRAZA/exec";

    // ⚠️ 학생 상세화면(관리 도구) 파일명 - 실제 사용 중인 파일명으로 바꿔주세요
    const MAIN_APP_FILENAME = "index.html";

    const courseLabels = { korean_teacher: "한국어교원 2급", social_worker: "사회복지사 2급" };

    document.getElementById("open-app-btn").href = MAIN_APP_FILENAME;

    let adminPassword = "";
    let allStudents = [];
    let sortField = "lastSaved";
    let sortAsc = false;

    function setLoginButtonLoading(isLoading) {
        const btn = document.getElementById("login-btn");
        if (!btn) return;
        btn.disabled = isLoading;
        btn.innerHTML = isLoading ? `<span class="spinner"></span> 확인 중...` : "입장";
    }

    function login() {
        const pw = document.getElementById("password-input").value;
        if (!pw) return;
        adminPassword = pw;
        setLoginButtonLoading(true);
        loadStudents();
    }

    function loadStudents() {
        document.getElementById("loading-state").style.display = "block";
        document.getElementById("empty-state").style.display = "none";
        document.getElementById("table-wrap").style.display = "none";

        fetch(`${API_URL}?action=admin_list&password=${encodeURIComponent(adminPassword)}`)
            .then(res => res.json())
            .then(data => {
                if (data.status === "unauthorized") {
                    document.getElementById("dashboard-screen").style.display = "none";
                    document.getElementById("login-screen").style.display = "block";
                    document.getElementById("login-error").style.display = "block";
                    document.getElementById("loading-state").style.display = "none";
                    setLoginButtonLoading(false);
                    sessionStorage.removeItem("admin_dashboard_pw");
                    return;
                }

                sessionStorage.setItem("admin_dashboard_pw", adminPassword);
                document.getElementById("login-screen").style.display = "none";
                document.getElementById("login-error").style.display = "none";
                document.getElementById("dashboard-screen").style.display = "block";

                allStudents = data.students || [];
                renderTable();
            })
            .catch(() => {
                alert("서버 통신 중 오류가 발생했습니다.");
                document.getElementById("loading-state").style.display = "none";
                setLoginButtonLoading(false);
            });
    }

    // 새로고침해도 로그인이 풀리지 않도록 세션에 저장된 비밀번호로 자동 재로그인 시도
    (function tryAutoLogin() {
        const savedPw = sessionStorage.getItem("admin_dashboard_pw");
        if (savedPw) {
            adminPassword = savedPw;
            document.getElementById("dashboard-screen").style.display = "block";
            loadStudents();
        } else {
            document.getElementById("login-screen").style.display = "block";
        }
    })();

    function logout() {
        sessionStorage.removeItem("admin_dashboard_pw");
        adminPassword = "";
        document.getElementById("dashboard-screen").style.display = "none";
        document.getElementById("login-screen").style.display = "block";
        document.getElementById("password-input").value = "";
    }

    function sortBy(field) {
        if (sortField === field) {
            sortAsc = !sortAsc;
        } else {
            sortField = field;
            sortAsc = true;
        }
        renderTable();
    }

    function renderTable() {
        const search = document.getElementById("search-input").value.trim();
        const phoneSearch = document.getElementById("phone-search-input").value.trim();
        const courseFilterVal = document.getElementById("course-filter").value;

        let filtered = allStudents.filter(s => {
            const matchName = !search || s.name.includes(search);
            const matchPhone = !phoneSearch || s.phone.endsWith(phoneSearch);
            const matchCourse = !courseFilterVal || s.course === courseFilterVal;
            return matchName && matchPhone && matchCourse;
        });

        filtered.sort((a, b) => {
            let av = a[sortField], bv = b[sortField];
            if (sortField === "lastSaved") { av = new Date(av || 0); bv = new Date(bv || 0); }
            if (av < bv) return sortAsc ? -1 : 1;
            if (av > bv) return sortAsc ? 1 : -1;
            return 0;
        });

        document.getElementById("loading-state").style.display = "none";
        document.getElementById("student-count").innerText = `총 ${filtered.length}명`;

        if (filtered.length === 0) {
            document.getElementById("empty-state").style.display = "block";
            document.getElementById("table-wrap").style.display = "none";
            return;
        }

        document.getElementById("empty-state").style.display = "none";
        document.getElementById("table-wrap").style.display = "block";

        const tbody = document.getElementById("student-table-body");
        tbody.innerHTML = filtered.map(s => {
            const suffix = s.phone.slice(-4);
            const courseClass = courseLabels[s.course] ? s.course : "unknown";
            const courseLabel = courseLabels[s.course] || (s.course || "미지정");
            const openUrl = `${MAIN_APP_FILENAME}?adminName=${encodeURIComponent(s.name)}&adminPhone=${encodeURIComponent(suffix)}&adminCourse=${encodeURIComponent(s.course)}`;

            return `
                <tr data-name="${s.name}" data-suffix="${suffix}" data-course="${s.course}">
                    <td><span class="name-link" onclick="showStudentCard(this)">${s.name}</span></td>
                    <td>${s.phone}</td>
                    <td><span class="course-badge ${courseClass}">${courseLabel}</span></td>
                    <td>${s.subjectCount}과목</td>
                    <td>${s.totalCredit}학점</td>
                    <td>${s.lastSaved || "-"}</td>
                    <td><a class="open-btn" href="${openUrl}" target="_blank">열기</a></td>
                </tr>
            `;
        }).join('');
    }

    function showStudentCard(el) {
        const tr = el.closest("tr");
        const name = tr.dataset.name;
        const suffix = tr.dataset.suffix;
        const course = tr.dataset.course;

        const modal = document.getElementById("student-modal");
        const modalBody = document.getElementById("student-modal-body");

        const src = `${MAIN_APP_FILENAME}?adminName=${encodeURIComponent(name)}&adminPhone=${encodeURIComponent(suffix)}&adminCourse=${encodeURIComponent(course)}&adminView=learner&_=${Date.now()}`;

        modalBody.innerHTML = `
            <div id="admin-memo-box" style="display:none; margin-bottom: 12px; padding: 10px 14px; background: #fffaf0; border: 1px solid #fbd38d; border-radius: 6px; max-height: 220px; overflow-y: auto;">
                <div style="font-weight:bold; color:#1a365d; font-size: 9.5pt; margin-bottom: 6px;">🔒 전체 학업계획 통합 메모 이력 <span style="font-weight:normal; color:#a0aec0; font-size:8.5pt;">(이 박스는 캡처에 절대 포함되지 않습니다)</span></div>
                <div id="admin-memo-list"></div>
            </div>
            <div id="iframe-scale-wrap" style="width: 100%; height: 70vh; overflow: hidden; border: 1px solid #e2e8f0; border-radius: 6px;">
                <iframe id="student-preview-iframe" src="${src}" scrolling="yes"
                    style="width: 100%; height: 100%; border: none; display: block;">
                </iframe>
            </div>
        `;
        modal.style.display = "flex";

        // 통합메모 이력 전체는 iframe(학습자 화면) 밖에서 대시보드가 직접 조회 - 절대 캡처 범위에 안 들어감
        fetch(`${API_URL}?name=${encodeURIComponent(name)}&suffix=${encodeURIComponent(suffix)}&course=${encodeURIComponent(course)}`)
            .then(res => res.json())
            .then(data => {
                const memoBox = document.getElementById("admin-memo-box");
                const memoList = document.getElementById("admin-memo-list");
                if (!memoBox || !memoList) return;
                const history = data.memoHistory || [];
                if (data.status === "success" && history.length > 0) {
                    const sorted = [...history].sort((a, b) => (a.date < b.date ? 1 : -1));
                    memoList.innerHTML = sorted.map(m => `
                        <div style="padding: 6px 0; border-top: 1px solid #fbd38d;">
                            <div style="font-size: 8.5pt; color: #a0aec0; margin-bottom: 2px;">${m.date}</div>
                            <div style="font-size: 10pt; white-space: pre-wrap;">${m.content}</div>
                        </div>
                    `).join('');
                    memoBox.style.display = "block";
                }
            })
            .catch(() => {});
    }

    function closeStudentCard() {
        document.getElementById("student-modal").style.display = "none";
        document.getElementById("student-modal-body").innerHTML = "";
    }
</script>
</body>
</html>
